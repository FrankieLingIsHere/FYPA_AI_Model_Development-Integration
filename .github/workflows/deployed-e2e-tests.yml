name: Backend Deployed Checks

on:
  push:
  workflow_dispatch:
    inputs:
      vercel_url:
        description: "Vercel frontend URL"
        required: false
        default: "https://fypa-ai-model-development-integrati.vercel.app"
      railway_api_base:
        description: "Railway API base URL"
        required: false
        default: "https://fypaaimodeldevelopment-integration-production.up.railway.app"

jobs:
  deployed-routing-health:
    name: Deployed Routing And Health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run schema regeneration contract test (offline)
        run: |
          python Updated_Pipeline_Supabase/tests/schema_regen_contract_test.py

      - name: Run routing and health checks
        env:
          CASM_VERCEL_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.vercel_url || 'https://fypa-ai-model-development-integrati.vercel.app' }}
          CASM_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
        run: |
          python Updated_Pipeline_Supabase/tests/deployed_routing_check.py

  deployed-system-conditions:
    name: Deployed System Conditions Matrix
    runs-on: ubuntu-latest
    needs: deployed-routing-health
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run deployed system conditions matrix
        env:
          CASM_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
          CASM_CONDITIONS_STRICT: "1"
          CASM_CONDITIONS_POLL_SECONDS: "90"
          CASM_CONDITIONS_POLL_INTERVAL: "5"
        run: |
          set +e
          python Updated_Pipeline_Supabase/tests/deployed_system_conditions_test.py
          first_exit=$?
          if [ "$first_exit" -ne 0 ]; then
            echo "WARN: first system-conditions attempt failed with exit code ${first_exit}; retrying once after brief backoff"
            sleep 15
            python Updated_Pipeline_Supabase/tests/deployed_system_conditions_test.py
            second_exit=$?
            if [ "$second_exit" -ne 0 ]; then
              echo "ERROR: system-conditions failed twice (first=${first_exit}, second=${second_exit})"
              exit "$second_exit"
            fi
          fi

      - name: Capture backend diagnostics on matrix failure
        if: failure()
        env:
          CASM_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
        run: |
          python - <<'PY'
          import json
          import os
          import requests

          base = os.environ.get("CASM_BASE_URL", "").rstrip("/")
          paths = [
              "/api/system/startup-status",
              "/api/queue/status",
              "/api/stats",
              "/api/reports/pending",
          ]

          for path in paths:
              url = f"{base}{path}"
              try:
                  r = requests.get(url, timeout=20)
                  text = (r.text or "")[:500]
                  try:
                      payload = r.json()
                  except Exception:
                      payload = text
                  print("DIAG", path, "status=", r.status_code)
                  print(json.dumps(payload, ensure_ascii=True)[:800])
              except Exception as exc:
                  print("DIAG", path, "error=", str(exc))
          PY

      - name: Run local failover and cache-sync contract test
        env:
          CASM_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
          CASM_LOCAL_FAILOVER_SYNC_STRICT: "1"
        run: |
          python Updated_Pipeline_Supabase/tests/deployed_local_failover_sync_contract_test.py

  deployed-live-start-contract:
    name: Deployed Live Start Contract
    runs-on: ubuntu-latest
    needs: deployed-routing-health
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run deployed live-start contract test
        env:
          CASM_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
        run: |
          python Updated_Pipeline_Supabase/tests/deployed_live_start_contract_test.py

  deployed-live-frame-contract:
    name: Deployed Live-Frame Contract
    runs-on: ubuntu-latest
    needs: deployed-routing-health
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run deployed live-frame contract test
        env:
          CASM_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
          CASM_LIVE_FRAME_TEST_IMAGE: Updated_Pipeline_Supabase/static/images/handbook-live.png
        run: |
          python Updated_Pipeline_Supabase/tests/deployed_live_frame_contract_test.py

  deployed-report-quality:
    name: Deployed Report Quality Contract
    runs-on: ubuntu-latest
    needs:
      - deployed-routing-health
      - deployed-system-conditions
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run deployed report quality contract test
        env:
          CASM_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
          CASM_REPORT_QUALITY_MAX_SCAN: "80"
          CASM_REPORT_QUALITY_MIN_CHARS: "90"
        run: |
          python Updated_Pipeline_Supabase/tests/deployed_report_quality_test.py

  deployed-report-open-latency:
    name: Deployed Report Open Latency Contract
    runs-on: ubuntu-latest
    needs:
      - deployed-routing-health
      - deployed-report-quality
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run deployed report-open latency contract test
        env:
          CASM_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
          CASM_REPORT_OPEN_WARM_TARGET_SECONDS: "1.0"
          CASM_REPORT_OPEN_WARM_SAMPLES: "3"
          CASM_REPORT_OPEN_RETRY_ATTEMPTS: "4"
          CASM_REPORT_OPEN_RETRY_BACKOFF_SECONDS: "4"
          CASM_REPORT_OPEN_MAX_SAMPLE_SECONDS: "2.5"
          CASM_REPORT_OPEN_NETWORK_BASELINE_PATH: "/api/system/startup-status"
          CASM_REPORT_OPEN_NETWORK_BASELINE_SAMPLES: "3"
          CASM_REPORT_OPEN_NETWORK_BASELINE_FREE_S: "0.20"
          CASM_REPORT_OPEN_NETWORK_ALLOWANCE_CAP_S: "0.60"
          CASM_REPORT_LATENCY_MAX_SCAN: "80"
          CASM_REPORT_LATENCY_MAX_CANDIDATES: "4"
        run: |
          python Updated_Pipeline_Supabase/tests/deployed_report_open_latency_test.py

  offline-contract-checks:
    name: Offline Contract Checks (No Supabase Egress)
    runs-on: ubuntu-latest
    needs: deployed-routing-health
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Offline E2E report upload-queue-poll contract
        run: |
          python Updated_Pipeline_Supabase/tests/offline_e2e_report_contract_test.py

      - name: Offline inference flood and dedup-guard contract
        run: |
          python Updated_Pipeline_Supabase/tests/offline_inference_flood_contract_test.py

      - name: Offline live-stream dedup probe contract
        run: |
          python Updated_Pipeline_Supabase/tests/offline_live_dedup_contract_test.py

      - name: Offline generate-now progression contract
        run: |
          python Updated_Pipeline_Supabase/tests/offline_generate_now_contract_test.py
