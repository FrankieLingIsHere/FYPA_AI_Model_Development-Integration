name: Backend Deployed Checks

on:
  push:
  workflow_dispatch:
    inputs:
      vercel_url:
        description: "Vercel frontend URL"
        required: false
        default: "https://fypa-ai-model-development-integrati.vercel.app"
      railway_api_base:
        description: "Railway API base URL"
        required: false
        default: "https://fypaaimodeldevelopment-integration-production.up.railway.app"
  schedule:
    - cron: "0 */6 * * *"

jobs:
  deployed-routing-health:
    name: Deployed Routing And Health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run routing and health checks
        env:
          LUNA_VERCEL_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.vercel_url || 'https://fypa-ai-model-development-integrati.vercel.app' }}
          LUNA_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
        run: |
          python Updated_Pipeline_Supabase/deployed_routing_check.py

  deployed-system-conditions:
    name: Deployed System Conditions Matrix
    runs-on: ubuntu-latest
    needs: deployed-routing-health
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run deployed system conditions matrix
        env:
          LUNA_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
        run: |
          set +e
          python Updated_Pipeline_Supabase/deployed_system_conditions_test.py
          first_exit=$?
          if [ "$first_exit" -ne 0 ]; then
            echo "WARN: first system-conditions attempt failed with exit code ${first_exit}; retrying once after brief backoff"
            sleep 15
            python Updated_Pipeline_Supabase/deployed_system_conditions_test.py
            second_exit=$?
            if [ "$second_exit" -ne 0 ]; then
              echo "ERROR: system-conditions failed twice (first=${first_exit}, second=${second_exit})"
              exit "$second_exit"
            fi
          fi

      - name: Capture backend diagnostics on matrix failure
        if: failure()
        env:
          LUNA_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
        run: |
          python - <<'PY'
          import json
          import os
          import requests

          base = os.environ.get("LUNA_BASE_URL", "").rstrip("/")
          paths = [
              "/api/system/startup-status",
              "/api/queue/status",
              "/api/stats",
              "/api/reports/pending",
          ]

          for path in paths:
              url = f"{base}{path}"
              try:
                  r = requests.get(url, timeout=20)
                  text = (r.text or "")[:500]
                  try:
                      payload = r.json()
                  except Exception:
                      payload = text
                  print("DIAG", path, "status=", r.status_code)
                  print(json.dumps(payload, ensure_ascii=True)[:800])
              except Exception as exc:
                  print("DIAG", path, "error=", str(exc))
          PY

      - name: Run inference flood capacity and duplicate-guard test
        env:
          LUNA_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
          LUNA_FLOOD_TEST_IMAGE: Updated_Pipeline_Supabase/static/images/handbook-live.png
          LUNA_FLOOD_TOTAL_REQUESTS: "8"
          LUNA_FLOOD_WORKERS: "3"
          LUNA_FLOOD_P95_MS: "12000"
          LUNA_FLOOD_MIN_SUCCESS_RATIO: "0.80"
          LUNA_FLOOD_MAX_UNIQUE_REPORTS: "1"
        run: |
          python Updated_Pipeline_Supabase/deployed_inference_flood_test.py

      - name: Run true live dedup probe test
        env:
          LUNA_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
          LUNA_LIVE_DEDUP_REPEATS: "4"
          LUNA_LIVE_DEDUP_MAX_ACCEPTED: "1"
          LUNA_LIVE_DEDUP_MIN_BLOCKED: "1"
        run: |
          python Updated_Pipeline_Supabase/deployed_live_dedup_probe_test.py

  deployed-live-start-contract:
    name: Deployed Live Start Contract
    runs-on: ubuntu-latest
    needs: deployed-routing-health
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run deployed live-start contract test
        env:
          LUNA_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
        run: |
          python Updated_Pipeline_Supabase/deployed_live_start_contract_test.py

  deployed-generate-now-smoke:
    name: Deployed Generate-Now Smoke
    runs-on: ubuntu-latest
    needs:
      - deployed-routing-health
      - deployed-system-conditions
      - deployed-live-start-contract
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run deployed generate-now progression smoke test
        env:
          LUNA_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
        run: |
          python Updated_Pipeline_Supabase/deployed_generate_now_smoke.py

      - name: Run upload E2E diagnostic (non-blocking)
        continue-on-error: true
        env:
          LUNA_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.railway_api_base || 'https://fypaaimodeldevelopment-integration-production.up.railway.app' }}
          LUNA_TEST_IMAGE: Updated_Pipeline_Supabase/static/images/handbook-live.png
        run: |
          python Updated_Pipeline_Supabase/e2e_report_test.py
