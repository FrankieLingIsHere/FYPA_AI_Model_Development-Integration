<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE Safety Monitor - AI-Powered Workplace Safety</title>
    <meta name="description" content="AI-powered PPE compliance monitoring system for real-time workplace safety detection using YOLOv8 and LLM analysis.">
    <meta name="theme-color" content="#00d4ff">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-hard-hat"></i>
                <span>PPE Safety Monitor</span>
            </div>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link active" data-page="home">
                    <i class="fas fa-home"></i> Home
                </a></li>
                <li><a href="#live" class="nav-link" data-page="live">
                    <i class="fas fa-video"></i> Live Monitor
                </a></li>
                <li><a href="#reports" class="nav-link" data-page="reports">
                    <i class="fas fa-file-alt"></i> Reports
                </a></li>
                <li><a href="#analytics" class="nav-link" data-page="analytics">
                    <i class="fas fa-chart-line"></i> Analytics
                </a></li>
                <li><a href="#about" class="nav-link" data-page="about">
                    <i class="fas fa-info-circle"></i> About
                </a></li>
            </ul>
            <div class="nav-timezone">
                <i class="fas fa-clock"></i>
                <select id="timezone-selector" class="timezone-select">
                    <option value="8">🇲🇾 Malaysia (UTC+8)</option>
                    <option value="8">🇸🇬 Singapore (UTC+8)</option>
                    <option value="8">🇨🇳 China (UTC+8)</option>
                    <option value="9">🇯🇵 Japan (UTC+9)</option>
                    <option value="5.5">🇮🇳 India (UTC+5:30)</option>
                    <option value="7">🇹🇭 Thailand (UTC+7)</option>
                    <option value="4">🇦🇪 Dubai (UTC+4)</option>
                    <option value="0">🇬🇧 UK (UTC+0)</option>
                    <option value="1">🇫🇷 France (UTC+1)</option>
                    <option value="-5">🇺🇸 US Eastern (UTC-5)</option>
                    <option value="-6">🇺🇸 US Central (UTC-6)</option>
                    <option value="-7">🇺🇸 US Mountain (UTC-7)</option>
                    <option value="-8">🇺🇸 US Pacific (UTC-8)</option>
                    <option value="10">🇦🇺 Sydney (UTC+10)</option>
                </select>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app" class="main-content">
        <!-- Pages will be dynamically loaded here -->
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 PPE Safety Monitor. AI-Powered Workplace Safety System.</p>
            <p class="footer-tech">
                Powered by YOLOv8 • LLaVA • Llama3 • Computer Vision
            </p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/static/js/timezone.js"></script>
    <script src="/static/js/progress.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/notifications.js"></script>
    <script src="/static/js/violation-monitor.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/router.js"></script>
    <script src="/static/js/pages/home.js"></script>
    <script src="/static/js/pages/live.js"></script>
    <script src="/static/js/pages/reports.js"></script>
    <script src="/static/js/pages/analytics.js"></script>
    <script src="/static/js/pages/about.js"></script>
    <script src="/static/js/app.js"></script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((registration) => {
                        console.log('[PWA] Service Worker registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.warn('[PWA] Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
